<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KAPI — Compiled Retrieval, embedding-free RAG">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#2e1065"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <style>
      text{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif}
      .chip{fill:#e9d5ff;font-size:15px;font-weight:600}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="300" rx="20" fill="url(#bg)"/>

  <!-- rising-bars motif (BM25 / compiled closure) -->
  <g opacity="0.16" fill="#a78bfa">
    <rect x="835" y="205" width="34" height="45"  rx="4"/>
    <rect x="879" y="180" width="34" height="70"  rx="4"/>
    <rect x="923" y="150" width="34" height="100" rx="4"/>
    <rect x="967" y="120" width="34" height="130" rx="4"/>
    <rect x="1011" y="86" width="34" height="164" rx="4"/>
    <rect x="1055" y="60" width="34" height="190" rx="4"/>
  </g>
  <!-- compile arrow: once -> served forever -->
  <g opacity="0.5" stroke="url(#accent)" stroke-width="3" fill="none">
    <path d="M812 250 q60 -30 120 0" stroke-dasharray="2 7" stroke-linecap="round"/>
  </g>

  <text x="70" y="122" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="3">KAPI</text>
  <text x="76" y="162" font-size="26" font-weight="700" fill="url(#accent)" letter-spacing="4">COMPILED RETRIEVAL</text>
  <text x="76" y="197" font-size="18.5" fill="#c7d2fe">Embedding-free RAG — the LLM compiles your docs once; queries stay pure BM25.</text>

  <!-- capability chips -->
  <g>
    <rect x="76"  y="222" width="176" height="34" rx="17" fill="#ffffff" opacity="0.07"/>
    <rect x="76"  y="222" width="176" height="34" rx="17" fill="none" stroke="#a78bfa" stroke-opacity="0.55"/>
    <text class="chip" x="164" y="244" text-anchor="middle">no embedding model</text>

    <rect x="264" y="222" width="130" height="34" rx="17" fill="#ffffff" opacity="0.07"/>
    <rect x="264" y="222" width="130" height="34" rx="17" fill="none" stroke="#a78bfa" stroke-opacity="0.55"/>
    <text class="chip" x="329" y="244" text-anchor="middle">no vector DB</text>

    <rect x="406" y="222" width="104" height="34" rx="17" fill="#ffffff" opacity="0.07"/>
    <rect x="406" y="222" width="104" height="34" rx="17" fill="none" stroke="#a78bfa" stroke-opacity="0.55"/>
    <text class="chip" x="458" y="244" text-anchor="middle">no GPU</text>

    <rect x="522" y="222" width="120" height="34" rx="17" fill="#22d3ee" opacity="0.14"/>
    <rect x="522" y="222" width="120" height="34" rx="17" fill="none" stroke="#22d3ee" stroke-opacity="0.7"/>
    <text class="chip" x="582" y="244" text-anchor="middle" fill="#a5f3fc">$0 / query</text>

    <rect x="654" y="222" width="96"  height="34" rx="17" fill="#22d3ee" opacity="0.14"/>
    <rect x="654" y="222" width="96"  height="34" rx="17" fill="none" stroke="#22d3ee" stroke-opacity="0.7"/>
    <text class="chip" x="702" y="244" text-anchor="middle" fill="#a5f3fc">~1 ms</text>
  </g>
</svg>
